# docker-homelab
version: '3'

networks:
  net:
    external: false

services:
# ------------- traefik -------------
  traefik:
    image: traefik:latest
    container_name: traefik-${NAME}
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/static.yml:/etc/traefik/traefik.yml:ro
      - ./config/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/etc/certs:ro
    networks:
      - net

# ------------- postgres -------------
  postgres:
    image: postgres:latest
    container_name: postgres-${NAME}
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWD}
      PGDATA: /var/lib/postgresql/data
    command: postgres -c ssl=on -c ssl_cert_file=/var/lib/postgresql/server.crt -c ssl_key_file=/var/lib/postgresql/server.key
    volumes:
      - ./postgres:/var/lib/postgresql/data
      - ./certs/certificate.pem:/var/lib/postgresql/server.crt:ro
      - ./certs/privatekey.pem:/var/lib/postgresql/server.key:ro
    networks:
      - net

# ------------- adminer -------------
  adminer:
    image: adminer:latest
    container_name: adminer-${NAME}
    restart: always
    depends_on:
      - postgres
    environment: 
      - ADMINER_DEFAULT_SERVER=${DB_TYPE}
      - ADMINER_DESIGN=nette
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net"
      - "traefik.http.routers.adminer.rule=Host(`adminer.localhost`)"
      - "traefik.http.routers.adminer.tls=true"
    networks:
      - net

# ------------- jenkins -------------
  jenkins:
    image: jenkins/jenkins:latest
    container_name: jenkins-${NAME}
    restart: always
#    environment:
#      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
#      JENKINS_OPTS: --argumentsRealm.roles.user=admin --argumentsRealm.passwd.admin=admin --argumentsRealm.roles.admin=admin
    networks:
      - net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net"
      - "traefik.http.routers.jenkins.rule=Host(`jenkins.localhost`)"
      - "traefik.http.routers.jenkins.tls=true"
      - "traefik.http.services.jenkins.loadbalancer.server.port=8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# ------------- gitea -------------
  gitea:
    image: gitea/gitea:latest
    container_name: gitea-${NAME}
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=${GITEA_URL}
      - GITEA__server__DOMAIN=${GITEA_HOSTNAME}
      - GITEA__database__DB_TYPE=${DB_TYPE}
      - GITEA__database__NAME=${DB_NAME}
      - GITEA__database__USER=${DB_USER}
      - GITEA__database__PASSWD=${DB_PASSWD}
      - GITEA__database__HOST=${DB_TYPE}:5432
      - GITEA__ui__DEFAULT_THEME=gitea
      - GITEA__database__SSL_MODE=require
    networks:
      - net
    labels:
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
      - "traefik.enable=true"
      - "traefik.docker.network=net"
      - "traefik.http.routers.gitea.rule=Host(`gitea.localhost`)"
      - "traefik.http.routers.gitea.tls=true"
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - postgres
